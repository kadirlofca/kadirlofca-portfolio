media: media
content:
  - name: projects
    label: Projects
    type: collection
    path: 'src/projects/markdowns'
    view:
      fields: [ title, published ]
    fields:

      - name: title
        type: string

      - name: slug
        type: string

      - name: description
        type: string

      - name: subdomains
        type: select
        options:
          values: [ swe, game ]
        
      - name: date
        type: date
      
      - name: published
        type: boolean
        default: true

      - name: body
        type: rich-text